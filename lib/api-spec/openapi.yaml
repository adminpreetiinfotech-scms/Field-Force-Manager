openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: activity
    description: Field activity feed
  - name: staff
    description: Staff directory
  - name: candidates
    description: Candidate registrations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff
      responses:
        "200":
          description: Staff directory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"

  /staff/register:
    post:
      operationId: registerStaff
      tags: [staff]
      summary: Register a new staff member or admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Phone number already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /staff/{staffId}/notes:
    patch:
      operationId: updateStaffNotes
      tags: [staff]
      summary: Save admin notes / feedback for a staff member
      parameters:
        - in: path
          name: staffId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotesInput"
      responses:
        "200":
          description: Notes saved.
          content:
            application/json:
              schema:
                type: object
                properties:
                  staffId:
                    type: string
                    format: uuid
                  notes:
                    type: string
                    nullable: true
                required: [staffId, notes]
        "404":
          description: Staff not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /admin/pending-staff:
    get:
      operationId: listPendingStaff
      tags: [admin]
      summary: List all staff with pending approval status
      responses:
        "200":
          description: List of pending staff members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"

  /admin/staff/{staffId}/approve:
    patch:
      operationId: approveStaff
      tags: [admin]
      summary: Approve a pending staff member
      parameters:
        - in: path
          name: staffId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Staff approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "404":
          description: Staff not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /admin/staff/{staffId}/reject:
    patch:
      operationId: rejectStaff
      tags: [admin]
      summary: Reject a pending staff member
      parameters:
        - in: path
          name: staffId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Staff rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "404":
          description: Staff not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /staff/{staffId}/profile-stats:
    get:
      operationId: getStaffProfileStats
      tags: [staff]
      summary: Detailed stats for a single mobilizer (rides, km, periods, monthly, recent trips)
      parameters:
        - in: path
          name: staffId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Full profile stats for the staff member.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StaffProfileStats"
        "404":
          description: Staff member not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity/ride-calendar:
    get:
      operationId: getRideCalendar
      tags: [activity]
      summary: Per-day ride counts for a calendar month (heat-map data)
      parameters:
        - in: query
          name: year
          required: true
          schema:
            type: integer
            description: Four-digit year, e.g. 2026.
        - in: query
          name: month
          required: true
          schema:
            type: integer
            description: Month number 1–12.
        - in: query
          name: staffId
          required: false
          schema:
            type: string
            format: uuid
            description: Filter to a single staff member. Omit for all staff.
      responses:
        "200":
          description: One entry per day that had at least one completed trip, plus metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RideCalendarMonth"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [activity]
      summary: Top staff ranked by total distance for a given period
      parameters:
        - in: query
          name: period
          required: true
          schema:
            type: string
            enum: [daily, weekly, monthly]
            description: Time period to aggregate over.
      responses:
        "200":
          description: Staff ranked by total km, highest first.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardEntry"
        "400":
          description: Invalid period value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity/trip-report:
    get:
      operationId: getTripReport
      tags: [activity]
      summary: Ride report — completed trips with staff details for CSV export
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            description: Start date, inclusive (YYYY-MM-DD).
        - in: query
          name: to
          required: true
          schema:
            type: string
            description: End date, inclusive (YYYY-MM-DD).
        - in: query
          name: staffId
          required: false
          schema:
            type: string
            format: uuid
            description: Filter to a single staff member. Omit for all staff.
      responses:
        "200":
          description: List of completed trips within the date range.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripReportRow"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List recent activity events
      description: |
        Returns the activity feed in reverse-chronological order. Use `cursor`
        for paginating older events and `since` for incremental polling.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: cursor
          description: Opaque cursor returned by a previous page response.
          schema:
            type: string
        - in: query
          name: since
          description: Return events strictly newer than this ISO timestamp.
          schema:
            type: string
            format: date-time
        - in: query
          name: kinds
          description: Comma-separated kinds to include (default all).
          schema:
            type: string
      responses:
        "200":
          description: Activity feed page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityPage"
        "400":
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      operationId: createActivity
      tags: [activity]
      summary: Ingest a new activity event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityEvent"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity/distance-stats:
    get:
      operationId: getDistanceStats
      tags: [activity]
      summary: Aggregated riding distance for a given date
      description: |
        Sums `distanceKm` from all `trip-end` events on the given date.
        Optionally filter to a single staff member.
      parameters:
        - in: query
          name: date
          description: Date in YYYY-MM-DD format (defaults to today in UTC).
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        - in: query
          name: staffId
          description: Filter to a single staff member (UUID).
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Distance statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistanceStats"
        "400":
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity/{id}:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get a single activity event with full details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /candidates/check-duplicate:
    post:
      operationId: checkDuplicateCandidate
      tags: [candidates]
      summary: Check if a candidate with given phone or Aadhaar already exists
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                aadhaarNumber:
                  type: string
      responses:
        "200":
          description: Duplicate check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  isDuplicate:
                    type: boolean
                  field:
                    type: string
                    nullable: true
                  existingName:
                    type: string
                    nullable: true
                required: [isDuplicate]

  /candidates/my:
    get:
      operationId: listMyCandidates
      tags: [candidates]
      summary: List candidates submitted by a specific staff member
      parameters:
        - name: phone
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of candidates submitted by this staff
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CandidateDto"

  /admin/candidates:
    get:
      operationId: listCandidates
      tags: [candidates]
      summary: List all candidates (admin)
      description: Admin endpoint — returns all candidate registrations ordered by newest first.
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Search by name or phone number
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, verified, rejected, enrolled]
        - name: mobilizer
          in: query
          schema:
            type: string
          description: Filter by mobilizer/staff name
        - name: village
          in: query
          schema:
            type: string
        - name: course
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of candidates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CandidateDto"

  /admin/candidates/{id}/status:
    patch:
      operationId: updateCandidateStatus
      tags: [candidates]
      summary: Approve, reject, or enroll a candidate (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, verified, rejected, enrolled]
                remarks:
                  type: string
                  nullable: true
                verifiedBy:
                  type: string
                  nullable: true
              required: [status]
      responses:
        "200":
          description: Updated candidate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDto"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: Get notifications for a staff member
      parameters:
        - name: phone
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationDto"

  /notifications/read-all:
    patch:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read for a staff member
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
              required: [phone]
      responses:
        "200":
          description: OK

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationDto"
        "404":
          description: Not found

  /candidates/{id}:
    get:
      operationId: getCandidate
      tags: [candidates]
      summary: Get a single candidate
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Candidate details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CandidateDto"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Staff:
      type: object
      properties:
        id:
          type: string
          format: uuid
        empCode:
          type: string
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [staff, admin]
        organization:
          type: string
          nullable: true
          description: Company / organization name (populated for admins and linked staff).
        area:
          type: string
          nullable: true
          description: Assigned territory or area (staff only).
        adminCode:
          type: string
          nullable: true
          description: Invite code that staff can use to link to this admin's organization.
        approvalStatus:
          type: string
          enum: [pending, approved, rejected]
          description: Approval workflow status. Staff are pending until an admin approves them.
        createdAt:
          type: string
          format: date-time
          nullable: true
          description: Registration timestamp (ISO 8601).
      required: [id, empCode, name, phone, role, approvalStatus]

    RegisterInput:
      type: object
      description: |
        Unified registration body. `kind` determines the role.
        Admin accounts require `organization`.
        Staff accounts optionally supply `empCode`, `area`, and `adminCode`.
      properties:
        kind:
          type: string
          enum: [admin, staff]
          description: Whether to create an admin or staff account.
        name:
          type: string
        phone:
          type: string
          description: 10-digit mobile number (no country code).
        organization:
          type: string
          nullable: true
          description: Company / organization name — required for admin registration.
        empCode:
          type: string
          nullable: true
          description: Custom employee code. Auto-generated if omitted.
        area:
          type: string
          nullable: true
          description: Assigned territory (staff only).
        adminCode:
          type: string
          nullable: true
          description: Invite code of an existing admin org to link to.
      required: [kind, name, phone]

    GeoPoint:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        accuracy:
          type: number
      required: [latitude, longitude]

    ActivityKind:
      type: string
      enum: [checkin, checkout, meter, trip-start, trip-end]

    ActivityEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/ActivityKind"
        staffId:
          type: string
          format: uuid
        staffName:
          type: string
        occurredAt:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time
        synced:
          type: boolean
        tripRef:
          type: string
          format: uuid
          nullable: true
        # Summary fields surfaced to the feed list (kind-dependent)
        summary:
          type: string
          description: Pre-formatted human-readable summary for list views
      required:
        - id
        - kind
        - staffId
        - staffName
        - occurredAt
        - receivedAt
        - synced
        - summary

    ActivityDetail:
      allOf:
        - $ref: "#/components/schemas/ActivityEvent"
        - type: object
          properties:
            location:
              $ref: "#/components/schemas/GeoPoint"
              nullable: true
            consumerNo:
              type: string
              nullable: true
            reading:
              type: number
              nullable: true
            photoUri:
              type: string
              nullable: true
            selfieUri:
              type: string
              nullable: true
            notes:
              type: string
              nullable: true
            distanceKm:
              type: number
              nullable: true
            durationSec:
              type: integer
              nullable: true
            origin:
              $ref: "#/components/schemas/GeoPoint"
              nullable: true
            destination:
              $ref: "#/components/schemas/GeoPoint"
              nullable: true

    ActivityPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"
        nextCursor:
          type: string
          nullable: true
        serverTime:
          type: string
          format: date-time
          description: Server clock at response — clients should send this back as `since` on the next poll.
      required: [items, nextCursor, serverTime]

    CreateActivityInput:
      type: object
      properties:
        kind:
          $ref: "#/components/schemas/ActivityKind"
        staffId:
          type: string
          format: uuid
        staffName:
          type: string
        occurredAt:
          type: string
          format: date-time
        tripRef:
          type: string
          format: uuid
          nullable: true
        location:
          $ref: "#/components/schemas/GeoPoint"
          nullable: true
        consumerNo:
          type: string
          nullable: true
        reading:
          type: number
          nullable: true
        photoUri:
          type: string
          nullable: true
        selfieUri:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        distanceKm:
          type: number
          nullable: true
        durationSec:
          type: integer
          nullable: true
        origin:
          $ref: "#/components/schemas/GeoPoint"
          nullable: true
        destination:
          $ref: "#/components/schemas/GeoPoint"
          nullable: true
      required: [kind, staffId, staffName]

    StaffDistance:
      type: object
      properties:
        staffId:
          type: string
          format: uuid
        staffName:
          type: string
        totalKm:
          type: number
        tripCount:
          type: integer
      required: [staffId, staffName, totalKm, tripCount]

    DistanceStats:
      type: object
      properties:
        date:
          type: string
          description: The date these stats cover (YYYY-MM-DD).
        totalKm:
          type: number
          description: Total km ridden across all staff.
        tripCount:
          type: integer
          description: Number of completed trips contributing to the total.
        perStaff:
          type: array
          items:
            $ref: "#/components/schemas/StaffDistance"
      required: [date, totalKm, tripCount, perStaff]

    UpdateNotesInput:
      type: object
      description: Request body for saving admin notes on a staff member.
      properties:
        notes:
          type: string
          nullable: true
          description: Free-form performance notes / area assignment. Pass null to clear.
      required: [notes]

    PeriodStats:
      type: object
      description: Ride stats for a specific time window.
      properties:
        rides:
          type: integer
        km:
          type: number
      required: [rides, km]

    MonthStat:
      type: object
      description: Aggregated stats for a single calendar month.
      properties:
        year:
          type: integer
        month:
          type: integer
          description: 1–12
        label:
          type: string
          description: Human-readable label, e.g. "Apr 2026".
        rides:
          type: integer
        km:
          type: number
      required: [year, month, label, rides, km]

    BestDay:
      type: object
      description: The single day with the most rides.
      properties:
        date:
          type: string
          description: YYYY-MM-DD in IST.
        rideCount:
          type: integer
        totalKm:
          type: number
      required: [date, rideCount, totalKm]

    RecentTrip:
      type: object
      description: A single completed trip for the profile recent-trips list.
      properties:
        tripRef:
          type: string
        rideDate:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        distanceKm:
          type: number
          nullable: true
        startLocation:
          type: string
          nullable: true
        endLocation:
          type: string
          nullable: true
      required: [tripRef, rideDate, startTime, endTime]

    StaffProfileStats:
      type: object
      description: Full profile and ride stats for a single staff member.
      properties:
        staffId:
          type: string
          format: uuid
        name:
          type: string
        empCode:
          type: string
        phone:
          type: string
        role:
          type: string
        organization:
          type: string
          nullable: true
        area:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
          description: Admin-written performance notes / area assignment for this staff member.
        lifetimeTotalRides:
          type: integer
        lifetimeTotalKm:
          type: number
        lifetimeAvgKmPerRide:
          type: number
        lifetimeActiveDays:
          type: integer
        firstRideDate:
          type: string
          nullable: true
          description: YYYY-MM-DD (IST) of first recorded trip, or null.
        periodToday:
          $ref: "#/components/schemas/PeriodStats"
        periodLast7Days:
          $ref: "#/components/schemas/PeriodStats"
        periodLast30Days:
          $ref: "#/components/schemas/PeriodStats"
        periodThisMonth:
          $ref: "#/components/schemas/PeriodStats"
        bestDay:
          nullable: true
          oneOf:
            - $ref: "#/components/schemas/BestDay"
            - type: "null"
        monthly:
          type: array
          items:
            $ref: "#/components/schemas/MonthStat"
          description: Last 6 full calendar months (oldest first).
        recentTrips:
          type: array
          items:
            $ref: "#/components/schemas/RecentTrip"
          description: Most recent 10 completed trips, newest first.
      required:
        - staffId
        - name
        - empCode
        - phone
        - role
        - lifetimeTotalRides
        - lifetimeTotalKm
        - lifetimeAvgKmPerRide
        - lifetimeActiveDays
        - periodToday
        - periodLast7Days
        - periodLast30Days
        - periodThisMonth
        - monthly
        - recentTrips

    RideCalendarDay:
      type: object
      description: Aggregated ride stats for a single calendar day.
      properties:
        date:
          type: string
          description: Calendar date (YYYY-MM-DD, IST).
        rideCount:
          type: integer
          description: Number of completed trips on this day.
        totalKm:
          type: number
          description: Total kilometres ridden on this day.
      required: [date, rideCount, totalKm]

    RideCalendarMonth:
      type: object
      description: Full month of calendar heat-map data.
      properties:
        year:
          type: integer
        month:
          type: integer
          description: Month 1–12.
        days:
          type: array
          items:
            $ref: "#/components/schemas/RideCalendarDay"
          description: Only days with rideCount > 0 are included.
        maxRideCount:
          type: integer
          description: Highest rideCount in the month (used to scale heat-map intensity).
        totalKm:
          type: number
          description: Total km for the entire month.
        totalRides:
          type: integer
          description: Total ride count for the entire month.
      required: [year, month, days, maxRideCount, totalKm, totalRides]

    LeaderboardEntry:
      type: object
      description: A single staff member's aggregated distance stats for the leaderboard.
      properties:
        rank:
          type: integer
          description: 1-based rank ordered by totalKm descending.
        staffId:
          type: string
          format: uuid
        staffName:
          type: string
        empCode:
          type: string
        totalKm:
          type: number
          description: Total kilometres travelled in the period.
        tripCount:
          type: integer
          description: Number of completed trips in the period.
        periodLabel:
          type: string
          description: Human-readable label for the period (e.g. "Today" or "Apr 2026").
        hasNotes:
          type: boolean
          description: True when this staff member has at least one admin note saved.
      required: [rank, staffId, staffName, empCode, totalKm, tripCount, periodLabel, hasNotes]

    TripReportRow:
      type: object
      description: A single completed trip for the ride report / CSV export.
      properties:
        tripRef:
          type: string
          format: uuid
          description: Shared tripRef that links the start and end events.
        staffId:
          type: string
          format: uuid
        staffName:
          type: string
        staffPhone:
          type: string
          description: 10-digit mobile number from the staff table.
        rideDate:
          type: string
          description: Calendar date of the trip (YYYY-MM-DD, in IST).
        startTime:
          type: string
          format: date-time
          description: When the trip started (ISO-8601 UTC).
        endTime:
          type: string
          format: date-time
          description: When the trip ended (ISO-8601 UTC).
        startLocation:
          type: string
          nullable: true
          description: "Human-readable start coords, e.g. '28.6139, 77.2090'."
        endLocation:
          type: string
          nullable: true
          description: "Human-readable end coords, e.g. '28.5355, 77.3910'."
        distanceKm:
          type: number
          nullable: true
          description: Total distance travelled in kilometres.
      required: [tripRef, staffId, staffName, staffPhone, rideDate, startTime, endTime]

