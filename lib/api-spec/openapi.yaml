openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: activity
    description: Field activity feed
  - name: staff
    description: Staff directory
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /staff:
    get:
      operationId: listStaff
      tags: [staff]
      summary: List all staff
      responses:
        "200":
          description: Staff directory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Staff"

  /staff/register:
    post:
      operationId: registerStaff
      tags: [staff]
      summary: Register a new staff member or admin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Staff"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
        "409":
          description: Phone number already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity/trip-report:
    get:
      operationId: getTripReport
      tags: [activity]
      summary: Ride report — completed trips with staff details for CSV export
      parameters:
        - in: query
          name: from
          required: true
          schema:
            type: string
            description: Start date, inclusive (YYYY-MM-DD).
        - in: query
          name: to
          required: true
          schema:
            type: string
            description: End date, inclusive (YYYY-MM-DD).
        - in: query
          name: staffId
          required: false
          schema:
            type: string
            format: uuid
            description: Filter to a single staff member. Omit for all staff.
      responses:
        "200":
          description: List of completed trips within the date range.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TripReportRow"
        "400":
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List recent activity events
      description: |
        Returns the activity feed in reverse-chronological order. Use `cursor`
        for paginating older events and `since` for incremental polling.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: cursor
          description: Opaque cursor returned by a previous page response.
          schema:
            type: string
        - in: query
          name: since
          description: Return events strictly newer than this ISO timestamp.
          schema:
            type: string
            format: date-time
        - in: query
          name: kinds
          description: Comma-separated kinds to include (default all).
          schema:
            type: string
      responses:
        "200":
          description: Activity feed page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityPage"
        "400":
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"
    post:
      operationId: createActivity
      tags: [activity]
      summary: Ingest a new activity event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityEvent"
        "400":
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity/distance-stats:
    get:
      operationId: getDistanceStats
      tags: [activity]
      summary: Aggregated riding distance for a given date
      description: |
        Sums `distanceKm` from all `trip-end` events on the given date.
        Optionally filter to a single staff member.
      parameters:
        - in: query
          name: date
          description: Date in YYYY-MM-DD format (defaults to today in UTC).
          schema:
            type: string
            pattern: "^\\d{4}-\\d{2}-\\d{2}$"
        - in: query
          name: staffId
          description: Filter to a single staff member (UUID).
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Distance statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DistanceStats"
        "400":
          description: Invalid query
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

  /activity/{id}:
    get:
      operationId: getActivity
      tags: [activity]
      summary: Get a single activity event with full details
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Event detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActivityDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProblemDetails"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Staff:
      type: object
      properties:
        id:
          type: string
          format: uuid
        empCode:
          type: string
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [staff, admin]
        organization:
          type: string
          nullable: true
          description: Company / organization name (populated for admins and linked staff).
        area:
          type: string
          nullable: true
          description: Assigned territory or area (staff only).
        adminCode:
          type: string
          nullable: true
          description: Invite code that staff can use to link to this admin's organization.
      required: [id, empCode, name, phone, role]

    RegisterInput:
      type: object
      description: |
        Unified registration body. `kind` determines the role.
        Admin accounts require `organization`.
        Staff accounts optionally supply `empCode`, `area`, and `adminCode`.
      properties:
        kind:
          type: string
          enum: [admin, staff]
          description: Whether to create an admin or staff account.
        name:
          type: string
        phone:
          type: string
          description: 10-digit mobile number (no country code).
        organization:
          type: string
          nullable: true
          description: Company / organization name — required for admin registration.
        empCode:
          type: string
          nullable: true
          description: Custom employee code. Auto-generated if omitted.
        area:
          type: string
          nullable: true
          description: Assigned territory (staff only).
        adminCode:
          type: string
          nullable: true
          description: Invite code of an existing admin org to link to.
      required: [kind, name, phone]

    GeoPoint:
      type: object
      properties:
        latitude:
          type: number
        longitude:
          type: number
        accuracy:
          type: number
      required: [latitude, longitude]

    ActivityKind:
      type: string
      enum: [checkin, checkout, meter, trip-start, trip-end]

    ActivityEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/ActivityKind"
        staffId:
          type: string
          format: uuid
        staffName:
          type: string
        occurredAt:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time
        synced:
          type: boolean
        tripRef:
          type: string
          format: uuid
          nullable: true
        # Summary fields surfaced to the feed list (kind-dependent)
        summary:
          type: string
          description: Pre-formatted human-readable summary for list views
      required:
        - id
        - kind
        - staffId
        - staffName
        - occurredAt
        - receivedAt
        - synced
        - summary

    ActivityDetail:
      allOf:
        - $ref: "#/components/schemas/ActivityEvent"
        - type: object
          properties:
            location:
              $ref: "#/components/schemas/GeoPoint"
              nullable: true
            consumerNo:
              type: string
              nullable: true
            reading:
              type: number
              nullable: true
            photoUri:
              type: string
              nullable: true
            selfieUri:
              type: string
              nullable: true
            notes:
              type: string
              nullable: true
            distanceKm:
              type: number
              nullable: true
            durationSec:
              type: integer
              nullable: true
            origin:
              $ref: "#/components/schemas/GeoPoint"
              nullable: true
            destination:
              $ref: "#/components/schemas/GeoPoint"
              nullable: true

    ActivityPage:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ActivityEvent"
        nextCursor:
          type: string
          nullable: true
        serverTime:
          type: string
          format: date-time
          description: Server clock at response — clients should send this back as `since` on the next poll.
      required: [items, nextCursor, serverTime]

    CreateActivityInput:
      type: object
      properties:
        kind:
          $ref: "#/components/schemas/ActivityKind"
        staffId:
          type: string
          format: uuid
        staffName:
          type: string
        occurredAt:
          type: string
          format: date-time
        tripRef:
          type: string
          format: uuid
          nullable: true
        location:
          $ref: "#/components/schemas/GeoPoint"
          nullable: true
        consumerNo:
          type: string
          nullable: true
        reading:
          type: number
          nullable: true
        photoUri:
          type: string
          nullable: true
        selfieUri:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        distanceKm:
          type: number
          nullable: true
        durationSec:
          type: integer
          nullable: true
        origin:
          $ref: "#/components/schemas/GeoPoint"
          nullable: true
        destination:
          $ref: "#/components/schemas/GeoPoint"
          nullable: true
      required: [kind, staffId, staffName]

    StaffDistance:
      type: object
      properties:
        staffId:
          type: string
          format: uuid
        staffName:
          type: string
        totalKm:
          type: number
        tripCount:
          type: integer
      required: [staffId, staffName, totalKm, tripCount]

    DistanceStats:
      type: object
      properties:
        date:
          type: string
          description: The date these stats cover (YYYY-MM-DD).
        totalKm:
          type: number
          description: Total km ridden across all staff.
        tripCount:
          type: integer
          description: Number of completed trips contributing to the total.
        perStaff:
          type: array
          items:
            $ref: "#/components/schemas/StaffDistance"
      required: [date, totalKm, tripCount, perStaff]

    TripReportRow:
      type: object
      description: A single completed trip for the ride report / CSV export.
      properties:
        tripRef:
          type: string
          format: uuid
          description: Shared tripRef that links the start and end events.
        staffId:
          type: string
          format: uuid
        staffName:
          type: string
        staffPhone:
          type: string
          description: 10-digit mobile number from the staff table.
        rideDate:
          type: string
          description: Calendar date of the trip (YYYY-MM-DD, in IST).
        startTime:
          type: string
          format: date-time
          description: When the trip started (ISO-8601 UTC).
        endTime:
          type: string
          format: date-time
          description: When the trip ended (ISO-8601 UTC).
        startLocation:
          type: string
          nullable: true
          description: "Human-readable start coords, e.g. '28.6139, 77.2090'."
        endLocation:
          type: string
          nullable: true
          description: "Human-readable end coords, e.g. '28.5355, 77.3910'."
        distanceKm:
          type: number
          nullable: true
          description: Total distance travelled in kilometres.
      required: [tripRef, staffId, staffName, staffPhone, rideDate, startTime, endTime]

    ProblemDetails:
      type: object
      properties:
        title:
          type: string
        detail:
          type: string
        status:
          type: integer
      required: [title]
