kind = "api"
previewPath = "/api"
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 3000
name = "API Server"
paths = ["/api"]

[services.env]
PORT = "3000"

[services.development]
run = "pnpm --filter @workspace/api-server run dev"

[services.production]
run = ["node", "--enable-source-maps", "artifacts/api-server/dist/index.mjs"]

[services.production.env]
PORT = "3000"
NODE_ENV = "production"

[services.production.build]
args = ["sh", "-c", "pnpm --filter @workspace/admin-panel run build && pnpm --filter @workspace/field-staff run build && pnpm --filter @workspace/api-server run build && pnpm --filter @workspace/db run push-force"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
