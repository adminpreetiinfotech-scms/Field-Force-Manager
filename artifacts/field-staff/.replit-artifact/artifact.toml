kind = "mobile"
previewPath = "/"
title = "SCMS Field App"
version = "1.0.0"
id = "artifacts/field-staff"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24426

[services.development]
run = "pnpm --filter @workspace/field-staff run dev"

[services.env]
PORT = "24426"
BASE_PATH = "/"

[services.production]
run = ["node", "artifacts/field-staff/server/serve.js"]

[services.production.env]
PORT = "24426"
NODE_ENV = "production"
BASE_PATH = "/"

[services.production.health.startup]
path = "/status"
