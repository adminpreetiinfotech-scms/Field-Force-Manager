kind = "mobile"
previewPath = "/"
title = "SCMS Field App"
version = "1.0.0"
id = "artifacts/field-staff"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 24426

[services.development]
run = "pnpm --filter @workspace/field-staff run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/field-staff", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/field-staff", "run", "serve" ]

[services.env]
PORT = "24426"
BASE_PATH = "/"
