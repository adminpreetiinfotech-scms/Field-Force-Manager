kind = "web"
previewPath = "/admin-panel/"
title = "SCMS Admin Panel"
version = "1.0.0"
id = "artifacts/admin-panel"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/admin-panel/" ]
localPort = 20130

[services.development]
run = "pnpm --filter @workspace/admin-panel run dev"

[services.env]
PORT = "20130"
BASE_PATH = "/admin-panel/"

[services.production]
publicDir = "dist/public"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/admin-panel", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"
BASE_PATH = "/admin-panel/"
